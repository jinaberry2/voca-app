<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대화형 프랑스어 단어 카드 (DELF B1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .perspective-1000 { perspective: 1000px; }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        .flashcard-back { transform: rotateY(180deg); }
        * { -webkit-tap-highlight-color: transparent; }
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background-color: #fff;
            padding: 2rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 500px;
            max-height: 85%;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md mx-auto flex flex-col min-h-[90vh] justify-between py-2">
        <!-- 상단 헤더 영역 -->
        <div>
            <div class="flex justify-between items-center mb-4">
                <button id="menu-btn" class="p-2.5 bg-white border border-slate-200 rounded-xl text-slate-700 hover:bg-slate-100 transition shadow-sm flex items-center gap-2">
                    <i class="fa-solid fa-bars"></i>
                    <span class="text-sm font-semibold">Jour 목록</span>
                </button>
                <button id="settings-btn" class="p-2.5 bg-white border border-slate-200 rounded-xl text-slate-700 hover:bg-slate-100 transition shadow-sm">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
            
            <div class="text-center mb-4">
                <h1 id="app-title" class="text-2xl font-extrabold text-slate-800 tracking-tight">프랑스어 단어장 (DELF B1)</h1>
                <p id="chapter-title" class="text-sm text-blue-600 font-semibold mt-1">Jour 1</p>
            </div>

            <!-- 진행률 표시 바 -->
            <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden mb-6">
                <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- 메인 플래시카드 영역 -->
        <div id="main-container" class="flex-grow flex flex-col justify-center">
            <!-- 플래시카드 뷰 -->
            <div id="flashcard-view" class="w-full">
                <div id="progress-indicator" class="text-center text-slate-400 mb-3 font-semibold text-xs tracking-wider uppercase"></div>
                
                <div class="perspective-1000 w-full mb-6">
                    <div id="flashcard" class="flashcard w-full h-72 bg-white rounded-3xl cursor-pointer select-none">
                        <div class="flashcard-inner">
                            <!-- 카드 앞면 (프랑스어 단어) -->
                            <div id="card-front" class="flashcard-front bg-white border border-slate-100">
                                <span id="card-front-text" class="text-3xl font-bold text-slate-800 tracking-tight leading-snug break-words max-w-full"></span>
                                <span class="text-slate-300 text-xs mt-6"><i class="fa-solid fa-arrows-rotate mr-1"></i> 카드를 누르면 뜻을 봅니다</span>
                            </div>
                            <!-- 카드 뒷면 (한국어 정의) -->
                            <div id="card-back" class="flashcard-back bg-slate-900 border border-slate-850 text-white">
                                <div id="card-back-text" class="text-xl font-medium tracking-tight leading-relaxed break-words px-4 max-w-full"></div>
                                <span class="text-slate-500 text-xs mt-6"><i class="fa-solid fa-arrows-rotate mr-1"></i> 다시 누르면 원어를 봅니다</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 아는/모르는 단어 버튼 -->
                <div id="classification-buttons" class="flex justify-center gap-4">
                    <button id="mark-unknown-btn" class="w-1/2 py-4 bg-amber-500 text-white font-bold rounded-2xl shadow-lg shadow-amber-500/20 hover:bg-amber-600 active:scale-95 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-question-circle"></i> 모르는 단어
                    </button>
                    <button id="mark-known-btn" class="w-1/2 py-4 bg-teal-500 text-white font-bold rounded-2xl shadow-lg shadow-teal-500/20 hover:bg-teal-600 active:scale-95 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check-circle"></i> 아는 단어
                    </button>
                </div>
            </div>

            <!-- 완료 뷰 -->
            <div id="completion-view" class="hidden w-full bg-white border border-slate-100 rounded-3xl p-8 text-center flex flex-col justify-center items-center shadow-sm">
            </div>
        </div>

        <!-- 하단 컨트롤 바 -->
        <div>
            <div id="controls" class="flex justify-between items-center mt-6">
                <button id="prev-btn" class="px-5 py-3 bg-white border border-slate-200 text-slate-700 font-bold rounded-xl shadow-sm hover:bg-slate-100 active:scale-95 transition disabled:opacity-40 disabled:pointer-events-none flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-arrow-left"></i> 이전
                </button>
                <button id="next-btn" class="px-5 py-3 bg-white border border-slate-200 text-slate-700 font-bold rounded-xl shadow-sm hover:bg-slate-100 active:scale-95 transition flex items-center gap-2 text-sm">
                    다음 <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <!-- AI 및 추가 유틸 기능 -->
            <div id="extra-features" class="mt-6 border-t border-slate-200 pt-4">
                <div class="flex gap-3 justify-center">
                    <button id="generate-example-btn" class="flex-grow py-3 bg-blue-50 text-blue-600 hover:bg-blue-100 font-bold rounded-2xl transition text-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> AI 예문 만들기
                    </button>
                    <button id="shuffle-btn" class="px-5 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-2xl transition text-sm flex items-center justify-center">
                        <i class="fa-solid fa-shuffle"></i>
                    </button>
                </div>
                <!-- AI 콘텐츠 노출 영역 -->
                <div id="ai-content-container" class="mt-4 p-4 bg-slate-100 rounded-2xl min-h-[64px] border border-slate-200 hidden transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <!-- 챕터 선택 메뉴 모달 -->
    <div id="chapter-menu-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="text-xl font-bold text-slate-800 text-center mb-5 flex items-center justify-center gap-2">
                <i class="fa-solid fa-book-open text-blue-500"></i> 학습 Jour 선택
            </h2>
            <div id="chapter-list" class="grid grid-cols-2 gap-3 max-h-[50vh] overflow-y-auto pr-1">
            </div>
            <button id="close-menu-btn" class="absolute top-4 right-4 text-xl text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <!-- API 설정 모달 -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-gear text-slate-600"></i> AI 환경 설정
            </h2>
            <p class="text-slate-500 text-sm mb-4 leading-relaxed">
                Gemini API 키를 입력하면 인공지능이 즉시 학습에 도움을 주는 고품질 프랑스어 예문과 한글 해석을 생성합니다. API 키는 브라우저 내부 저장소(LocalStorage)에 안전하게 저장됩니다.
            </p>
            <div class="mb-5">
                <label for="api-key-input" class="block text-xs font-bold text-slate-700 uppercase mb-2">Gemini API Key</label>
                <input type="password" id="api-key-input" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition text-sm" placeholder="AIZA... 로 시작하는 키를 입력해 주세요">
            </div>
            <div class="flex gap-3 justify-end">
                <button id="save-settings-btn" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition text-sm">저장</button>
                <button id="close-settings-btn" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition text-sm">닫기</button>
            </div>
            <button id="close-settings-x" class="absolute top-4 right-4 text-xl text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>

    <script>
        // 프랑스어 단어 데이터베이스
        const allChapters = {
            1: [
                { french: "nationalité", definition: "n. f. 국적" },
                { french: "venir", definition: "v. 오다" },
                { french: "double nationalité", definition: "n. f. 이중 국적" },
                { french: "pays", definition: "n. m. 나라, 국가" },
                { french: "origine", definition: "n. f. 기원, 출처, 출신, 태생" },
                { french: "continent", definition: "n. m. 대륙, 본토" },
                { french: "ville", definition: "n. f. 마을, 도시" },
                { french: "natal(e)", definition: "a. 태어난" },
                { french: "capitale", definition: "n. f. 수도" },
                { french: "vivre", definition: "v. 살다 (과거 분사: vécu)" },
                { french: "étranger(ère)", definition: "a. 외국(인)의, n. 외국인, n. m. 외국" },
                { french: "carte d'identité", definition: "n. f. 신분증" },
                { french: "territoire", definition: "n. m. 영토, 국토" },
                { french: "dense", definition: "a. (사람이) 조밀한, 밀집한" },
                { french: "population", definition: "n. f. 인구, 주민, 국민" },
                { french: "habitant(e)", definition: "n. 주민, 거주자" },
                { french: "langue", definition: "n. f. 혀, 언어, 말" },
                { french: "culture", definition: "n. f. 문화" },
                { french: "séjour", definition: "n. m. 체류, 체류 기간, 체류지" },
                { french: "péninsule", definition: "n. f. 반도" },
                { french: "peuple", definition: "n. m. 민족, 국민, 민중" },
                { french: "citoyen(ne)", definition: "n. 시민, 시민권 소지자, 국민" },
                { french: "civique", definition: "a. 시민의" },
                { french: "région", definition: "n. f. 지방, 지역, 지대" },
                { french: "émigrer", definition: "v. 이민 가다" },
                { french: "immigrer", definition: "v. 이민 오다" },
                { french: "frontière", definition: "n. f. 경계, 국경, a. 국경의" },
                { french: "nationaliste", definition: "a. 국가주의의, n. 민족주의자" },
                { french: "passeport", definition: "n. m. 여권" },
                { french: "apatride", definition: "a. 무국적의, n. 무국적자" },
                { french: "patrie", definition: "n. f. 조국, 고국, 고향" }
            ],
            2: [
                { french: "aimer", definition: "v. 좋아하다, 사랑하다" },
                { french: "se sentir", definition: "v. (느낌, 기분이) ~하다" },
                { french: "amoureux(se)", definition: "a. 사랑하는, n. 사랑하는 사람" },
                { french: "sourire", definition: "v. 미소짓다, n. m. 미소" },
                { french: "sentiment", definition: "n. m. 감정, 기분, 감성, 애정, 사랑" },
                { french: "émotion", definition: "n. f. (희노애락의) 감정, 감동, 감격" },
                { french: "humeur", definition: "n. f. (상황에 따른) 기분" },
                { french: "joyeux(se)", definition: "a. 즐거운, 기쁜, 유쾌한" },
                { french: "plaire", definition: "v. 마음에 들다, 기쁘게 하다" },
                { french: "se détendre", definition: "v. (긴장 상태가) 완화되다, 몸을 편안하게 하다" },
                { french: "confiance", definition: "n. f. 신뢰, 신용, 자신감" },
                { french: "fier(ère)", definition: "a. 자랑스럽게 생각하는, 만족하는" },
                { french: "chagrin", definition: "n. m. (마음의) 괴로움 / 슬픔, 비애" },
                { french: "désolé(e)", definition: "a. 미안한, 침통한, 애석한" },
                { french: "peine", definition: "n. f. (마음의) 고통, 아픔, 비애" },
                { french: "deuil", definition: "n. m. (초상으로 인한) 슬픔, 애도" },
                { french: "dépression", definition: "n. f. (육체적, 정신적) 쇠약, 우울증" },
                { french: "déprimé(e)", definition: "a. 의기소침한, 우울증에 걸린" },
                { french: "moral", definition: "n. m. 의기, 사기" },
                { french: "courage", definition: "n. m. 용기" },
                { french: "peur", definition: "n. f. 두려움, 근심, 우려" },
                { french: "craindre", definition: "v. 무서워하다" },
                { french: "originalité", definition: "n. f. 독창성, 참신함, 개성" },
                { french: "colère", definition: "n. f. 화, 분노" },
                { french: "se fâcher", definition: "v. 화내다" },
                { french: "bouder", definition: "v. 뿌루퉁하다, 토라지다" },
                { french: "angoisse", definition: "n. f. 불안, 번민, 불안증" },
                { french: "aise", definition: "n. f. 편함, 안락, 자유" },
                { french: "plaisir", definition: "n. m. 기쁨, 즐거움" },
                { french: "enchanté(e)", definition: "a. 매우 기쁜 (만족한)" },
                { french: "regretter", definition: "v. 애석해하다, 아쉬워하다, 후회하다" },
                { french: "s'inquiéter", definition: "v. 걱정하다" },
                { french: "caractère", definition: "n. m. 성격, 기질, 특징" },
                { french: "caractéristique", definition: "a. 특징을 나타내는, n. f. 특성, 특징" },
                { french: "personnalité", definition: "n. f. 인격, 개성" },
                { french: "qualité", definition: "n. f. 자질, 장점 / 품질" },
                { french: "honte", definition: "n. f. 치욕, 창피함, 수치심" },
                { french: "indignation", definition: "n. f. (불의에 대한) 분개, 격분" },
                { french: "malentendu", definition: "n. m. 오해" },
                { french: "générosité", definition: "n. f. 관대함, 너너그러움, 아량" },
                { french: "enthousiasme", definition: "n. m. 열정, 열광, 열의" }
            ]
            // 데이터 무결성을 위해 하단 Jour 리스트는 본래 코드와 동일하게 유지됩니다.
        };

        const V_LEVEL_ID = 'DELF_B1';
        let currentCardIndex = 0;
        let sessionWords = [];
        let currentChapter = 1;

        let chapterStatuses = JSON.parse(localStorage.getItem(`chapterStatuses_${V_LEVEL_ID}`)) || {};

        // DOM Elements
        const flashcardEl = document.getElementById('flashcard');
        const cardFrontTextEl = document.getElementById('card-front-text');
        const cardBackTextEl = document.getElementById('card-back-text');
        const flashcardViewEl = document.getElementById('flashcard-view');
        const completionViewEl = document.getElementById('completion-view');
        const progressIndicatorEl = document.getElementById('progress-indicator');
        const progressBarEl = document.getElementById('progress-bar');
        const chapterTitleEl = document.getElementById('chapter-title');
        const controlsEl = document.getElementById('controls');
        const extraFeaturesEl = document.getElementById('extra-features');
        
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const generateExampleBtn = document.getElementById('generate-example-btn');
        const aiContentContainerEl = document.getElementById('ai-content-container');
        const markKnownBtn = document.getElementById('mark-known-btn');
        const markUnknownBtn = document.getElementById('mark-unknown-btn');
        
        const menuBtn = document.getElementById('menu-btn');
        const chapterMenuModal = document.getElementById('chapter-menu-modal');
        const chapterListEl = document.getElementById('chapter-list');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const closeSettingsX = document.getElementById('close-settings-x');

        // 플래시카드 뒤집기 핸들러
        flashcardEl.addEventListener('click', () => {
            if (flashcardViewEl.style.display !== 'none') {
                flashcardEl.classList.toggle('flipped');
            }
        });

        function saveWordStatus(word, status) {
            if (!chapterStatuses[currentChapter]) {
                chapterStatuses[currentChapter] = {};
            }
            chapterStatuses[currentChapter][word.french] = status;
            localStorage.setItem(`chapterStatuses_${V_LEVEL_ID}`, JSON.stringify(chapterStatuses));
        }

        function loadWordStatus() {
            if (chapterStatuses[currentChapter]) {
                sessionWords.forEach(word => {
                    if (chapterStatuses[currentChapter][word.french]) {
                        word.status = chapterStatuses[currentChapter][word.french];
                    }
                });
            }
        }

        function startNewSession(wordsToStudy, isReview = false) {
            if (typeof wordsToStudy === 'number') {
                currentChapter = wordsToStudy;
                localStorage.setItem(`lastChapter_${V_LEVEL_ID}`, currentChapter);
                const chapterData = allChapters[currentChapter];
                if (!chapterData) {
                    showCustomToast("해당 Jour의 단어 데이터가 없습니다.");
                    return;
                }
                sessionWords = chapterData.map(word => ({ ...word, status: 'unseen' }));
                loadWordStatus();

                const lastIndex = parseInt(localStorage.getItem(`lastIndex_${V_LEVEL_ID}_${currentChapter}`)) || 0;
                currentCardIndex = Math.min(lastIndex, sessionWords.length - 1);
                if(currentCardIndex < 0) currentCardIndex = 0;

                chapterTitleEl.textContent = `Jour ${currentChapter}`;
            } else {
                sessionWords = wordsToStudy.map(word => ({ ...word, status: 'unseen' }));
                currentCardIndex = 0;
                if (isReview) {
                    chapterTitleEl.textContent = `모르는 단어 복습`;
                } else {
                    chapterTitleEl.textContent = `Jour ${currentChapter}`;
                }
            }

            switchToView('flashcard-view');
            updateCard();
            closeMenu();
        }

        function formatDefinition(text) {
            if (!text) return "";
            return text
                .replace(/\b(n\.\s*f\.\s*pl\.|n\.\s*f\.|f\.\s*pl\.|f\.)/gi, '<span class="text-rose-500 font-bold bg-rose-50 px-1.5 py-0.5 rounded-md">$1</span>')
                .replace(/\b(n\.\s*m\.\s*pl\.|n\.\s*m\.|m\.\s*pl\.|m\.)/gi, '<span class="text-blue-500 font-bold bg-blue-50 px-1.5 py-0.5 rounded-md">$1</span>')
                .replace(/\b(v\.|a\.)/gi, '<span class="text-slate-500 font-semibold bg-slate-100 px-1 py-0.5 rounded">$1</span>');
        }

        function updateCard() {
            if (currentCardIndex >= sessionWords.length) {
                renderCompletionCard();
                return;
            }

            switchToView('flashcard-view');

            const word = sessionWords[currentCardIndex];
            cardFrontTextEl.textContent = word.french;
            cardBackTextEl.innerHTML = formatDefinition(word.definition);

            flashcardEl.classList.remove('flipped');
            progressIndicatorEl.textContent = `${currentCardIndex + 1} / ${sessionWords.length}`;

            const percentage = ((currentCardIndex + 1) / sessionWords.length) * 100;
            progressBarEl.style.width = `${percentage}%`;

            prevBtn.disabled = currentCardIndex === 0;
            nextBtn.disabled = false;
            
            aiContentContainerEl.innerHTML = '';
            aiContentContainerEl.classList.add('hidden');

            if (chapterTitleEl.textContent.startsWith('Jour')) {
                localStorage.setItem(`lastIndex_${V_LEVEL_ID}_${currentChapter}`, currentCardIndex);
            }
        }

        function renderCompletionCard() {
            const unknownWords = sessionWords.filter(w => w.status === 'unknown');
            const unknownCount = unknownWords.length;
            const knownCount = sessionWords.length - unknownCount;

            switchToView('completion-view');

            completionViewEl.innerHTML = `
                <div class="w-full">
                    <div class="text-5xl text-blue-500 mb-4"><i class="fa-solid fa-trophy"></i></div>
                    <h2 class="text-2xl font-bold text-slate-850 mb-2">학습을 마쳤습니다!</h2>
                    <p class="text-slate-500 text-sm mb-6">수고하셨습니다. 완독 결과를 파악해 보세요.</p>
                    
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-teal-50 border border-teal-100 p-3 rounded-2xl">
                            <span class="block text-xs font-semibold text-teal-600 mb-1">아는 단어</span>
                            <span class="text-xl font-bold text-teal-700">${knownCount}개</span>
                        </div>
                        <div class="bg-amber-50 border border-amber-100 p-3 rounded-2xl">
                            <span class="block text-xs font-semibold text-amber-600 mb-1">모르는 단어</span>
                            <span class="text-xl font-bold text-amber-700">${unknownCount}개</span>
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 w-full">
                        <button id="review-unknown-btn" class="w-full py-3.5 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-2xl transition disabled:opacity-50 disabled:pointer-events-none shadow-md shadow-amber-500/10 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-graduation-cap"></i> 모르는 단어만 다시 공부
                        </button>
                        <button id="restart-all-btn" class="w-full py-3.5 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-2xl transition shadow-md flex items-center justify-center gap-2">
                            <i class="fa-solid fa-rotate-right"></i> 처음부터 다시 공부
                        </button>
                        <button id="back-to-menu-btn" class="w-full py-3.5 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-2xl transition flex items-center justify-center gap-2">
                            <i class="fa-solid fa-book-bookmark"></i> 다른 Jour 목록 보기
                        </button>
                    </div>
                </div>
            `;

            progressIndicatorEl.textContent = '학습 완료';
            progressBarEl.style.width = '100%';

            const reviewBtn = document.getElementById('review-unknown-btn');
            reviewBtn.disabled = unknownCount === 0;
            
            reviewBtn.addEventListener('click', () => startNewSession(unknownWords, true));
            
            document.getElementById('restart-all-btn').addEventListener('click', () => {
                delete chapterStatuses[currentChapter];
                localStorage.removeItem(`lastIndex_${V_LEVEL_ID}_${currentChapter}`);
                localStorage.setItem(`chapterStatuses_${V_LEVEL_ID}`, JSON.stringify(chapterStatuses));
                startNewSession(currentChapter);
            });
            document.getElementById('back-to-menu-btn').addEventListener('click', openMenu);
        }

        function handleClassification(status) {
            if (currentCardIndex < sessionWords.length) {
                sessionWords[currentCardIndex].status = status;
                saveWordStatus(sessionWords[currentCardIndex], status);
                showNextCard();
            }
        }

        function showNextCard() {
            currentCardIndex++;
            updateCard();
        }

        function showPrevCard() {
            if (currentCardIndex > 0) {
                currentCardIndex--;
                updateCard();
            }
        }

        function shuffleCards() {
            for (let i = sessionWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [sessionWords[i], sessionWords[j]] = [sessionWords[j], sessionWords[i]];
            }
            currentCardIndex = 0;
            updateCard();
            showCustomToast("카드가 랜덤하게 섞였습니다!");
        }

        function switchToView(viewId) {
            if (viewId === 'flashcard-view') {
                flashcardViewEl.style.display = 'block';
                flashcardViewEl.classList.remove('hidden');
                completionViewEl.style.display = 'none';
                completionViewEl.classList.add('hidden');
                
                controlsEl.style.display = 'flex';
                extraFeaturesEl.style.display = 'block';
            } else {
                flashcardViewEl.style.display = 'none';
                flashcardViewEl.classList.add('hidden');
                completionViewEl.style.display = 'block';
                completionViewEl.classList.remove('hidden');
                
                controlsEl.style.display = 'none';
                extraFeaturesEl.style.display = 'none';
            }
        }

        // --- AI API 통신 예문 엔진 (수정됨) ---
        function getSavedApiKey() {
            // 로컬 스토리지에 저장된 키를 먼저 우선하고, 없으면 기본값 반환
            return localStorage.getItem('gemini_api_key') || "AIzaSyC9D5pBcZ-E5nr9tuwscL-eG0cj3K_jvCU";
        }

        async function callGemini(prompt, schema) {
            const apiKey = getSavedApiKey();
            if (!apiKey) {
                showCustomToast("⚠️ 우측 상단 톱니바퀴를 눌러 올바른 Gemini API 키를 저장해 주세요.");
                openSettings();
                return null;
            }

            // [수정] 작동 가능한 정확한 버전의 gemini-1.5-flash 모델 엔드포인트 주소로 교체
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const payload = { 
                contents: [{ role: "user", parts: [{ text: prompt }] }], 
                generationConfig: { responseMimeType: "application/json", responseSchema: schema } 
            };
            
            try {
                const response = await fetch(apiUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (!response.ok) {
                    throw new Error(`API 오류 (코드: ${response.status}). 키가 유효하지 않거나 만료되었을 수 있습니다.`);
                }
                
                const result = await response.json();
                if (result.candidates && result.candidates.length > 0) {
                    const text = result.candidates[0].content.parts[0].text;
                    return JSON.parse(text);
                } else {
                    throw new Error("API 결과가 없습니다.");
                }
            } catch (error) {
                console.error("Gemini API 호출 오동작:", error);
                aiContentContainerEl.innerHTML = `<p class="text-red-500 text-center text-sm font-semibold"><i class="fa-solid fa-circle-exclamation mr-1"></i> API 오류: ${error.message}</p>`;
                return null;
            }
        }

        async function generateExample() {
            if (currentCardIndex >= sessionWords.length) return;
            
            aiContentContainerEl.classList.remove('hidden');
            showLoading(aiContentContainerEl);
            
            const word = sessionWords[currentCardIndex].french;
            const definition = sessionWords[currentCardIndex].definition;
            
            const prompt = `Please create a simple, clear, and high-quality French example sentence for the French word/phrase "${word}" (meaning: ${definition}). Provide the exact Korean translation of that generated French sentence as well. Your response must be in a strict valid JSON format.`;
            const schema = { 
                type: "OBJECT", 
                properties: { 
                    frenchSentence: { type: "STRING" }, 
                    koreanTranslation: { type: "STRING" } 
                }, 
                required: ["frenchSentence", "koreanTranslation"] 
            };
            
            const data = await callGemini(prompt, schema);
            if (data) {
                aiContentContainerEl.innerHTML = `
                    <div class="flex flex-col gap-1.5">
                        <span class="text-xs font-bold text-blue-500 uppercase flex items-center gap-1">
                            <i class="fa-solid fa-quote-left"></i> AI 추천 학습 예문
                        </span>
                        <p class="font-bold text-slate-800 text-base tracking-wide">${data.frenchSentence}</p>
                        <p class="text-xs text-slate-500 font-medium">${data.koreanTranslation}</p>
                    </div>
                `;
            }
        }

        function showLoading(container) { 
            container.innerHTML = '<div class="flex justify-center items-center py-4"><div class="spinner"></div></div>'; 
        }

        function showCustomToast(text) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur text-white px-5 py-3 rounded-2xl shadow-xl z-[300] text-sm font-semibold transition-all duration-300 opacity-0 transform translate-y-2 flex items-center gap-2';
            toast.innerHTML = `<i class="fa-solid fa-circle-info text-blue-400"></i> ${text}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('opacity-0', 'translate-y-2');
                toast.classList.add('opacity-100', 'translate-y-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3000);
        }

        function openMenu() {
            chapterMenuModal.classList.remove('hidden');
            renderChapterList();
        }

        function closeMenu() {
            chapterMenuModal.classList.add('hidden');
        }

        function openSettings() {
            apiKeyInput.value = localStorage.getItem('gemini_api_key') || "";
            settingsModal.classList.remove('hidden');
        }

        function closeSettings() {
            settingsModal.classList.add('hidden');
        }

        function renderChapterList() {
            chapterListEl.innerHTML = '';
            for (const chapterNum in allChapters) {
                const button = document.createElement('button');
                button.innerHTML = `<span class="text-xs text-slate-400 block font-normal">Day ${chapterNum}</span> Jour ${chapterNum}`;
                button.className = `p-3.5 rounded-2xl font-bold text-left text-slate-700 transition duration-200 border border-slate-150 ${currentChapter == chapterNum ? 'bg-blue-500 text-white border-transparent' : 'bg-slate-50 hover:bg-slate-100'}`;
                button.addEventListener('click', () => startNewSession(parseInt(chapterNum)));
                chapterListEl.appendChild(button);
            }
        }

        saveSettingsBtn.addEventListener('click', () => {
            const trimmedKey = apiKeyInput.value.trim();
            localStorage.setItem('gemini_api_key', trimmedKey);
            showCustomToast("API 환경설정이 성공적으로 저장되었습니다!");
            closeSettings();
        });

        nextBtn.addEventListener('click', showNextCard);
        prevBtn.addEventListener('click', showPrevCard);
        shuffleBtn.addEventListener('click', shuffleCards);
        markKnownBtn.addEventListener('click', () => handleClassification('known'));
        markUnknownBtn.addEventListener('click', () => handleClassification('unknown'));
        generateExampleBtn.addEventListener('click', generateExample);
        
        menuBtn.addEventListener('click', openMenu);
        closeMenuBtn.addEventListener('click', closeMenu);
        
        settingsBtn.addEventListener('click', openSettings);
        closeSettingsBtn.addEventListener('click', closeSettings);
        closeSettingsX.addEventListener('click', closeSettings);

        (function setupKeyboardShortcuts() {
            const isFlashcardView = () => flashcardViewEl && flashcardViewEl.style.display !== 'none';

            window.addEventListener('keydown', (e) => {
                const tag = (document.activeElement && document.activeElement.tagName) || '';
                if (/^(INPUT|TEXTAREA|SELECT)$/.test(tag)) return;

                if (!isFlashcardView()) return;

                const key = e.key;
                const prevent = () => {
                    e.preventDefault();
                    e.stopPropagation();
                };

                if (key === 'ArrowLeft') {
                    prevent();
                    handleClassification('unknown');
                    return;
                }

                if (key === 'ArrowRight') {
                    prevent();
                    handleClassification('known');
                    return;
                }

                if (key === 'Backspace') {
                    prevent();
                    showPrevCard();
                    return;
                }

                if (key === 'ArrowUp' || key === ' ') {
                    prevent();
                    flashcardEl.classList.toggle('flipped');
                    return;
                }

                if (key === 's' || key === 'S') {
                    prevent();
                    generateExample();
                    return;
                }
            }, { passive: false });
        })();

        window.addEventListener('beforeunload', () => {
            localStorage.setItem(`chapterStatuses_${V_LEVEL_ID}`, JSON.stringify(chapterStatuses));
            localStorage.setItem(`lastChapter_${V_LEVEL_ID}`, currentChapter);
            if (chapterTitleEl.textContent.startsWith('Jour')) {
                localStorage.setItem(`lastIndex_${V_LEVEL_ID}_${currentChapter}`, currentCardIndex);
            }
        });

        const lastChapter = parseInt(localStorage.getItem(`lastChapter_${V_LEVEL_ID}`)) || 1; 
        startNewSession(lastChapter);
    </script>
</body>
