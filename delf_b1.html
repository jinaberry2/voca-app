        .perspective-1000 { perspective: 1000px; }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        .flashcard-back { transform: rotateY(180deg); }
        * { -webkit-tap-highlight-color: transparent; }
        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {

            border-radius: 1.5rem;

            max-width: 500px;
            max-height: 85%;

                sessionWords = chapterData.map(word => ({ ...word, status: 'unseen' }));
                loadWordStatus();

                const lastIndex = parseInt(localStorage.getItem(`lastIndex_${V_LEVEL_ID}_${currentChapter}`)) || 0;
                currentCardIndex = Math.min(lastIndex, sessionWords.length - 1);
                if(currentCardIndex < 0) currentCardIndex = 0;

                chapterTitleEl.textContent = `Jour ${currentChapter}`;

                sessionWords = wordsToStudy.map(word => ({ ...word, status: 'unseen' }));

                    chapterTitleEl.textContent = `모르는 단어 복습`;

        // --- AI API 통신 예문 엔진 (2026년 정식 버전 gemini-2.5-flash 패스로 전면 고정) ---
        function getSavedApiKey() {
            return localStorage.getItem('gemini_api_key') || "";
        }

        async function callGemini(prompt, schema) {
            const apiKey = getSavedApiKey();
            if (!apiKey) {
                showCustomToast("⚠️ 우측 상단 톱니바퀴를 눌러 발급받으신 Gemini API 키를 저장해 주세요.");
                openSettings();
                return null;
            }

            // 구버전 1.5-flash 404 차단을 우회하기 위해 정식 패스인 gemini-2.5-flash로 전면 일치
            const apiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = { 
                contents: [{ role: "user", parts: [{ text: prompt }] }], 
                generationConfig: { responseMimeType: "application/json", responseSchema: schema } 
            };
            
            try {
                const response = await fetch(apiUrl, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (!response.ok) {
                    throw new Error(`API 오류 (코드: ${response.status}). 키 권한 또는 서버 주소 매칭 실패.`);
                }
                
                const result = await response.json();
                if (result.candidates && result.candidates.length > 0) {
                    let text = result.candidates[0].content.parts[0].text;
                    text = text.replace(/```json/g, '').replace(/```/g, '').trim();
                    return JSON.parse(text);
                } else {
                    throw new Error("API 결과 데이터가 비어있습니다.");
                }
            } catch (error) {
                console.error("Gemini API 호출 오동작:", error);
                aiContentContainerEl.innerHTML = `<p class="text-red-500 text-center text-sm font-semibold"><i class="fa-solid fa-circle-exclamation mr-1"></i> ${error.message}</p>`;
                return null;
            }
        }

            const definition = sessionWords[currentCardIndex].definition;
            
            const prompt = `Please create a simple, clear, and high-quality French example sentence for the French word/phrase "${word}" (meaning: ${definition}). Provide the exact Korean translation of that generated French sentence as well. Your response must be in a strict valid JSON format.`;
            const schema = { 
                type: "OBJECT", 
                properties: { 
                    frenchSentence: { type: "STRING" }, 
                    koreanTranslation: { type: "STRING" } 
                }, 
                required: ["frenchSentence", "koreanTranslation"] 
            };
            
            const data = await callGemini(prompt, schema);
            if (data) {
                aiContentContainerEl.innerHTML = `

        }

        function openMenu() {
            chapterMenuModal.classList.remove('hidden');
            renderChapterList();
        }

        function closeMenu() {
            chapterMenuModal.classList.add('hidden');
        }

        function openSettings() {
            apiKeyInput.value = localStorage.getItem('gemini_api_key') || "";
            settingsModal.classList.remove('hidden');
        }

        function closeSettings() {
            settingsModal.classList.add('hidden');
        }

        function renderChapterList() {
            chapterListEl.innerHTML = '';
            for (const chapterNum in allChapters) {
                const button = document.createElement('button');
                button.innerHTML = `<span class="text-xs text-slate-400 block font-normal">Day ${chapterNum}</span> Jour ${chapterNum}`;
                button.className = `p-3.5 rounded-2xl font-bold text-left text-slate-700 transition duration-200 border border-slate-150 ${currentChapter == chapterNum ? 'bg-blue-500 text-white border-transparent' : 'bg-slate-50 hover:bg-slate-100'}`;
                button.addEventListener('click', () => startNewSession(parseInt(chapterNum)));
                chapterListEl.appendChild(button);
            }
        }

        saveSettingsBtn.addEventListener('click', () => {
            const trimmedKey = apiKeyInput.value.trim();
            localStorage.setItem('gemini_api_key', trimmedKey);
            showCustomToast("API 환경설정이 성공적으로 저장되었습니다!");
            closeSettings();
        });

        nextBtn.addEventListener('click', showNextCard);
        prevBtn.addEventListener('click', showPrevCard);
        shuffleBtn.addEventListener('click', shuffleCards);
        markKnownBtn.addEventListener('click', () => handleClassification('known'));
        markUnknownBtn.addEventListener('click', () => handleClassification('unknown'));
        generateExampleBtn.addEventListener('click', generateExample);
        
        menuBtn.addEventListener('click', openMenu);
        closeMenuBtn.addEventListener('click', closeMenu);
        
        settingsBtn.addEventListener('click', openSettings);
        closeSettingsBtn.addEventListener('click', closeSettings);
        closeSettingsX.addEventListener('click', closeSettings);

        (function setupKeyboardShortcuts() {
            const isFlashcardView = () => flashcardViewEl && flashcardViewEl.style.display !== 'none';

            window.addEventListener('keydown', (e) => {
                const tag = (document.activeElement && document.activeElement.tagName) || '';
                if (/^(INPUT|TEXTAREA|SELECT)$/.test(tag)) return;

                if (!isFlashcardView()) return;

                const key = e.key;
                const prevent = () => {
                    e.preventDefault();
                    e.stopPropagation();
                };

                if (key === 'ArrowLeft') {
                    prevent();
                    handleClassification('unknown');
                    return;
                }

                if (key === 'ArrowRight') {
                    prevent();
                    handleClassification('known');
                    return;
                }

                if (key === 'Backspace') {
                    prevent();
                    showPrevCard();
                    return;
                }

                if (key === 'ArrowUp' || key === ' ') {
                    prevent();
                    flashcardEl.classList.toggle('flipped');
                    return;
                }

                if (key === 's' || key === 'S') {
                    prevent();
                    generateExample();
                    return;
                }
            }, { passive: false });
        })();

        window.addEventListener('beforeunload', () => {
            localStorage.setItem(`chapterStatuses_${V_LEVEL_ID}`, JSON.stringify(chapterStatuses));
            localStorage.setItem(`lastChapter_${V_LEVEL_ID}`, currentChapter);
            if (chapterTitleEl.textContent.startsWith('Jour')) {
                localStorage.setItem(`lastIndex_${V_LEVEL_ID}_${currentChapter}`, currentCardIndex);
            }
        });

        const lastChapter = parseInt(localStorage.getItem(`lastChapter_${V_LEVEL_ID}`)) || 1; 
        startNewSession(lastChapter);
    </script>
</body>
</html>
